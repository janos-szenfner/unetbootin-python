name: Release

on:
  push:
    tags:
      - 'v*'
  # Allow running the build jobs manually from the Actions tab (for validating
  # a build without cutting a release). NOTE: the GitHub Release itself is only
  # created on a tag push — see the `create-release` job's `if:` guard.
  workflow_dispatch:

# Cancel previous runs on same branch
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.10'
  APP_NAME: 'unetbootin'
  
jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.0.0

      - name: Build with PyInstaller
        # A .spec file already encodes onefile/windowed/name, so only
        # spec-compatible flags may be passed. Single line = PowerShell-safe.
        # The UAC "requireAdministrator" manifest is embedded by the spec
        # (uac_admin=True), so no post-build mt.exe step is needed.
        run: pyinstaller unetbootin-windows.spec --noconfirm --clean --distpath dist/windows

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.APP_NAME }}-windows
          path: dist/windows/
          retention-days: 14

  build-macos:
    name: Build macOS App (Apple Silicon)
    runs-on: macos-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.0.0

      - name: Build with PyInstaller (Universal 2 for Apple Silicon + Intel)
        run: pyinstaller unetbootin-macos.spec --noconfirm --clean --distpath dist/macos

      - name: Create ZIP (Primary - No Gatekeeper issues)
        run: |
          cd dist/macos
          zip -r ${{ env.APP_NAME }}.zip ${{ env.APP_NAME }}.app

      - name: Create DMG (Alternative - Requires Gatekeeper bypass)
        run: |
          mkdir -p dmg_temp
          hdiutil create -volname "UNetbootin" \
            -srcfolder dist/macos/${{ env.APP_NAME }}.app \
            -ov -format UDZO \
            -o dist/macos/${{ env.APP_NAME }}.dmg
          rm -rf dmg_temp

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.APP_NAME }}-macos
          path: dist/macos/
          retention-days: 14

  build-linux-appimage:
    name: Build Linux AppImage
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.0.0
          sudo apt-get update
          sudo apt-get install -y patchelf wget
          # AppImage tooling needs libfuse2 at runtime. Ubuntu 24.04 renamed
          # the package to libfuse2t64; fall back to libfuse2 on older runners.
          sudo apt-get install -y libfuse2t64 || sudo apt-get install -y libfuse2

      - name: Build with PyInstaller
        run: pyinstaller unetbootin.spec --noconfirm --clean --distpath dist/linux-appimage

      - name: Create AppImage
        # The AppDir contains files reported as more than one architecture, so
        # appimagetool can't infer the target. Pin it explicitly.
        env:
          ARCH: x86_64
          # Pin the output filename; otherwise the plugin derives it from the
          # desktop-file Name ("UNetbootin"), which the mv glob below misses.
          OUTPUT: ${{ env.APP_NAME }}.AppImage
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          cp dist/linux-appimage/${{ env.APP_NAME }} AppDir/usr/bin/
          cp resources/linux/unetbootin.desktop AppDir/usr/share/applications/
          cp src/unetbootin/resources/icons/unetbootin_256.png AppDir/usr/share/icons/hicolor/256x256/apps/unetbootin.png
          mkdir -p AppDir/usr/share/unetbootin/resources
          cp -r src/unetbootin/resources/* AppDir/usr/share/unetbootin/resources/
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable AppDir/usr/bin/${{ env.APP_NAME }} \
            --desktop-file AppDir/usr/share/applications/unetbootin.desktop \
            --icon-filename AppDir/usr/share/icons/hicolor/256x256/apps/unetbootin.png \
            --output appimage
          mv ${{ env.APP_NAME }}.AppImage dist/linux-appimage/${{ env.APP_NAME }}.AppImage
          chmod +x dist/linux-appimage/${{ env.APP_NAME }}.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.APP_NAME }}-linux-appimage
          path: dist/linux-appimage/
          retention-days: 14

  build-linux-deb:
    name: Build Linux DEB
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.0.0
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev rubygems build-essential rpm
          sudo gem install fpm -v 1.15.1

      - name: Build with PyInstaller
        run: pyinstaller unetbootin.spec --noconfirm --clean --distpath dist/linux-deb

      - name: Create DEB package
        run: |
          mkdir -p package/usr/bin
          mkdir -p package/usr/share/${{ env.APP_NAME }}
          mkdir -p package/usr/share/applications
          mkdir -p package/usr/share/icons/hicolor/256x256/apps
          cp dist/linux-deb/${{ env.APP_NAME }} package/usr/bin/
          cp -r src/unetbootin/resources/* package/usr/share/${{ env.APP_NAME }}/
          cp resources/linux/unetbootin.desktop package/usr/share/applications/${{ env.APP_NAME }}.desktop
          cp src/unetbootin/resources/icons/unetbootin_256.png package/usr/share/icons/hicolor/256x256/apps/${{ env.APP_NAME }}.png
          VER="${GITHUB_REF_NAME#v}"; case "$VER" in [0-9]*) ;; *) VER="0.0.0" ;; esac
          fpm -s dir -t deb \
            -n ${{ env.APP_NAME }} \
            -v "$VER" \
            --architecture amd64 \
            --maintainer "UNetbootin Team <geza0kovacs@gmail.com>" \
            --description "Create bootable USB drives from ISO files" \
            --license GPLv2+ \
            --url https://unetbootin.sourceforge.net \
            --depends syslinux \
            --depends syslinux-common \
            --depends dosfstools \
            --depends mtools \
            -p dist/linux-deb/${{ env.APP_NAME }}.deb \
            package/

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.APP_NAME }}-linux-deb
          path: dist/linux-deb/
          retention-days: 14

  build-linux-rpm:
    name: Build Linux RPM
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.0.0
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev rubygems build-essential rpm
          sudo gem install fpm -v 1.15.1

      - name: Build with PyInstaller
        run: pyinstaller unetbootin.spec --noconfirm --clean --distpath dist/linux-rpm

      - name: Create RPM package
        run: |
          mkdir -p package/usr/bin
          mkdir -p package/usr/share/${{ env.APP_NAME }}
          mkdir -p package/usr/share/applications
          mkdir -p package/usr/share/icons/hicolor/256x256/apps
          cp dist/linux-rpm/${{ env.APP_NAME }} package/usr/bin/
          cp -r src/unetbootin/resources/* package/usr/share/${{ env.APP_NAME }}/
          cp resources/linux/unetbootin.desktop package/usr/share/applications/${{ env.APP_NAME }}.desktop
          cp src/unetbootin/resources/icons/unetbootin_256.png package/usr/share/icons/hicolor/256x256/apps/${{ env.APP_NAME }}.png
          VER="${GITHUB_REF_NAME#v}"; case "$VER" in [0-9]*) ;; *) VER="0.0.0" ;; esac
          fpm -s dir -t rpm \
            -n ${{ env.APP_NAME }} \
            -v "$VER" \
            --architecture x86_64 \
            --maintainer "UNetbootin Team <geza0kovacs@gmail.com>" \
            --description "Create bootable USB drives from ISO files" \
            --license GPLv2+ \
            --url https://unetbootin.sourceforge.net \
            --depends syslinux \
            --depends dosfstools \
            --depends mtools \
            -p dist/linux-rpm/${{ env.APP_NAME }}.rpm \
            package/

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.APP_NAME }}-linux-rpm
          path: dist/linux-rpm/
          retention-days: 14

  build-flatpak:
    name: Build Flatpak
    runs-on: ubuntu-latest
    needs: test
    # Flatpak in CI is sandbox-sensitive and the least natural fit for a tool
    # that writes raw block devices. Don't let it block the release: if it
    # fails, the other artifacts still ship (see create-release's `if:`).
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Flatpak
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          # Use the per-user installation — the runner user cannot modify the
          # system-wide flatpak configuration (ConfigureRemote not allowed).
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.freedesktop.Platform//24.08
          flatpak install --user -y flathub org.freedesktop.Sdk//24.08

      - name: Build Flatpak
        run: |
          mkdir -p build-flatpak dist/flatpak
          # The positional arg is the build directory; export to an ostree
          # repo with --repo so build-bundle has a repository to read.
          flatpak-builder --user --install-deps-from=flathub \
            --force-clean \
            --repo=build-flatpak/repo \
            build-flatpak/build \
            resources/linux/com.unetbootin.UNetbootin.json
          flatpak build-bundle \
            build-flatpak/repo \
            dist/flatpak/${{ env.APP_NAME }}.flatpak \
            com.unetbootin.UNetbootin
          flatpak info dist/flatpak/${{ env.APP_NAME }}.flatpak

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.APP_NAME }}-flatpak
          path: dist/flatpak/
          retention-days: 14

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos, build-linux-appimage, build-linux-deb, build-linux-rpm, build-flatpak]
    # Run once all builds have settled (always()), but only cut the release if
    # the five CORE artifacts succeeded. Flatpak is optional and must not block
    # the release; download-artifact still includes it if present.
    if: >-
      always() &&
      startsWith(github.ref, 'refs/tags/') &&
      needs.build-windows.result == 'success' &&
      needs.build-macos.result == 'success' &&
      needs.build-linux-appimage.result == 'success' &&
      needs.build-linux-deb.result == 'success' &&
      needs.build-linux-rpm.result == 'success'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts
          merge-multiple: false

      - name: Add macOS README
        run: |
          mkdir -p artifacts/${{ env.APP_NAME }}-macos/
          cp resources/macos/README-macOS.md artifacts/${{ env.APP_NAME }}-macos/

      - name: Display artifact structure
        run: find artifacts/ -type f

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref }}
          body: |
            ### Changes
            
            - Windows: EXE with UAC manifest for admin elevation
            - macOS: .app bundle (Universal 2 - Apple Silicon + Intel), distributed as ZIP and DMG
            - Linux: AppImage, DEB, RPM, and Flatpak packages

            ### macOS Installation Notes
            
            The macOS app is **unsigned** (no Apple Developer certificate). 
            **First launch**: Right-click on UNetbootin in Applications → Open → Click Open in the security dialog.
            
            See `README-macOS.md` in the macOS artifact for detailed instructions.
            
            ### Installation
            
            **Windows**: Run `unetbootin.exe` (UAC elevation required)
            **macOS**: 
            - ZIP: Extract and drag to Applications, then right-click → Open
            - DMG: Mount, drag to Applications, then right-click → Open
            **Linux**: 
            - AppImage: `chmod +x unetbootin.AppImage && ./unetbootin.AppImage`
            - DEB: `sudo dpkg -i unetbootin.deb`
            - RPM: `sudo rpm -i unetbootin.rpm`
            - Flatpak: `flatpak install unetbootin.flatpak`
          files: |
            artifacts/${{ env.APP_NAME }}-windows/*
            artifacts/${{ env.APP_NAME }}-macos/*
            artifacts/${{ env.APP_NAME }}-linux-appimage/*
            artifacts/${{ env.APP_NAME }}-linux-deb/*
            artifacts/${{ env.APP_NAME }}-linux-rpm/*
            artifacts/${{ env.APP_NAME }}-flatpak/*
          generate_release_notes: true
          make_latest: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
